version: '3.8'

services:
  mongodb:
    image: mongo:5
    container_name: payment-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27018:27017"
    volumes:
      - payment-mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  payment-service:
    build: .
    container_name: payment-service
    environment:
      PORT: 3004
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/payment-service?authSource=admin
      ORDER_SERVICE_URL: http://host.docker.internal:3003/api/orders
      USER_SERVICE_URL: http://host.docker.internal:3001/api/users
      STRIPE_API_KEY: sk_test_your_key_here
      PAYPAL_CLIENT_ID: your_paypal_client_id
      PAYPAL_CLIENT_SECRET: your_paypal_client_secret
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  payment-mongodb-data:

networks:
  default:
    driver: bridge
