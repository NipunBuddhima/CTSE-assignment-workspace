name: Payment Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'payment-service/**'
      - '.github/workflows/payment-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'payment-service/**'
      - '.github/workflows/payment-service.yml'

env:
  SERVICE_NAME: payment-service
  DOCKER_IMAGE: nipunbuddhima/payment-service
  SERVICE_PORT: 3004

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./payment-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: payment-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          NODE_ENV: test
          ORDER_SERVICE_URL: http://localhost:3003/api/orders
          USER_SERVICE_URL: http://localhost:3001/api/users

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: payment-service-coverage
          path: payment-service/coverage/

  # ─── Job 2: Security Scan (Snyk) ────────────────────────────
  security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./payment-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=payment-service/package.json --severity-threshold=high
        continue-on-error: true

      - name: Run Snyk monitor
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --file=payment-service/package.json
        continue-on-error: true

  # ─── Job 3: Build & Push Docker Image ───────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          file: ./payment-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Deploy to AWS ECS ───────────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster shophub-cluster \
            --service payment-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster shophub-cluster \
            --services payment-service \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}
