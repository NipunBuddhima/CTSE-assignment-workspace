name: Build, Scan, and Publish Services

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: user-service
            service_path: sliit-user-service
            image_name: user-service
          - service_name: product-service
            service_path: product_catalog_service
            image_name: product-service
          - service_name: order-service
            service_path: sliit-order-service
            image_name: order-service

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service_path }}

      - name: Run Snyk SAST and dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=${{ matrix.service_path }}/package.json --severity-threshold=high

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service_path }}
          file: ./${{ matrix.service_path }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image_name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image_name }}:${{ github.sha }}
