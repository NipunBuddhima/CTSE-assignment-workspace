version: '3.8'

services:
  mongodb:
    image: mongo:5
    container_name: product-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - product-mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  product-service:
    build: .
    container_name: product-service
    environment:
      PORT: 3002
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/product-service?authSource=admin
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  product-mongodb-data:

networks:
  default:
    name: product-network
