services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

  user-service:
    build:
      context: ./sliit-user-service
      args:
        PORT: 8001
    image: user-service:local
    container_name: user-service
    environment:
      PORT: 8001
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/user_service_db
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - microservices-net

  product-service:
    build:
      context: ./product_catalog_service
      args:
        PORT: 8002
    image: product-service:local
    container_name: product-service
    environment:
      PORT: 8002
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/product_service_db
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    build:
      context: ./sliit-order-service
      args:
        PORT: 8003
    image: order-service:local
    container_name: order-service
    environment:
      PORT: 8003
      NODE_ENV: production
      USER_SERVICE_URL: http://user-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      MONGO_URI: mongodb://mongo:27017/order_service_db
    ports:
      - "8003:8003"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  mongo_data:
